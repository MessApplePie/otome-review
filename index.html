<!DOCTYPE html>
<html lang="zh-CN" data-theme="pink">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>很高兴你也爱玩日乙并有自己的见解</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>

<body>

  <!-- ══════════════════════════════════════
     NAVBAR
══════════════════════════════════════ -->
  <nav class="navbar">
    <div class="navbar__inner">
      <!-- Logo -->
      <div class="navbar__logo" onclick="Router.navigate('/')">
        很高兴你也爱玩日乙并有自己的见解<span>✿</span>
      </div>

      <!-- Search -->
      <div class="navbar__search">
        <span class="navbar__search-icon">🔍</span>
        <input type="text" id="navbar-search" placeholder="搜索游戏名、公司、编剧…">
      </div>

      <!-- Actions -->
      <div class="navbar__actions">
        <!-- Theme switcher -->
        <div class="theme-switcher" title="切换主题色">
          <span class="theme-dot active" data-t="pink" title="粉色"></span>
          <span class="theme-dot" data-t="purple" title="紫色"></span>
          <span class="theme-dot" data-t="blue" title="蓝色"></span>
          <span class="theme-dot" data-t="green" title="绿色"></span>
          <span class="theme-dot" data-t="yellow" title="黄色"></span>
          <span class="theme-dot" data-t="grey" title="灰色"></span>
        </div>

        <!-- Export -->
        <button class="btn btn-ghost btn-sm" onclick="DB.exportJSON()" title="导出 JSON 备份">
          ⬇ 导出
        </button>

        <!-- Import -->
        <label class="btn btn-ghost btn-sm" title="导入 JSON 备份" style="cursor:pointer">
          ⬆ 导入
          <input type="file" accept=".json,application/json" id="import-input" style="display:none">
        </label>

        <!-- Add game -->
        <button class="btn btn-primary btn-sm" onclick="Router.navigate('/add')">
          ＋ 添加游戏
        </button>
      </div>
    </div>
  </nav>

  <!-- ══════════════════════════════════════
     HOME PAGE
══════════════════════════════════════ -->
  <section id="page-home" class="page">
    <div class="container">
      <!-- Filter bar -->
      <div class="filter-bar" id="home-filter-bar"></div>

      <!-- Stats + grid heading -->
      <div class="section-heading">
        <h2>我的游戏库</h2>
        <div id="home-stats" style="display:flex;gap:10px;align-items:center"></div>
      </div>

      <!-- Game grid -->
      <div class="game-grid" id="home-game-grid"></div>
    </div>
  </section>

  <!-- ══════════════════════════════════════
     ADD / EDIT FORM PAGE
══════════════════════════════════════ -->
  <section id="page-form" class="page">
    <!-- dynamically rendered by form.js -->
  </section>

  <!-- ══════════════════════════════════════
     GAME DETAIL PAGE
══════════════════════════════════════ -->
  <section id="page-detail" class="page">
    <!-- dynamically rendered by detail.js -->
  </section>

  <!-- ══════════════════════════════════════
     TOAST CONTAINER
══════════════════════════════════════ -->
  <div id="toast-container"></div>

  <!-- ══════════════════════════════════════
     SCRIPTS (order matters)
══════════════════════════════════════ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/router.js"></script>
  <script src="js/home.js"></script>
  <script src="js/form.js"></script>
  <script src="js/detail.js"></script>

  <script>
    /* ── Bootstrap ─────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {

      // Apply saved theme
      const savedTheme = DB.getTheme();
      document.documentElement.dataset.theme = savedTheme;
      document.querySelectorAll('.theme-dot').forEach(dot => {
        dot.classList.toggle('active', dot.dataset.t === savedTheme);
      });

      // Theme switcher
      document.querySelectorAll('.theme-dot').forEach(dot => {
        dot.addEventListener('click', () => {
          const t = dot.dataset.t;
          document.documentElement.dataset.theme = t;
          DB.setTheme(t);
          document.querySelectorAll('.theme-dot').forEach(d =>
            d.classList.toggle('active', d.dataset.t === t)
          );
        });
      });

      // Import JSON
      document.getElementById('import-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          importWithConfirm(text);
        } catch {
          Components.showToast('读取文件失败', 'error');
        }
        e.target.value = '';
      });

    });

    function importWithConfirm(text) {
      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = `
    <div class="confirm-box">
      <h3>导入备份</h3>
      <p>请选择导入方式：<br>
        <small style="color:var(--text-muted)">「合并」保留现有数据并覆盖同 ID 记录；「替换」清除所有现有数据。</small>
      </p>
      <div class="btn-row">
        <button class="btn btn-ghost" id="import-cancel">取消</button>
        <button class="btn btn-outline" id="import-merge">合并导入</button>
        <button class="btn btn-primary" id="import-replace">替换导入</button>
      </div>
    </div>`;
      overlay.querySelector('#import-cancel').onclick = () => overlay.remove();
      overlay.querySelector('#import-merge').onclick = () => doImport(text, 'merge', overlay);
      overlay.querySelector('#import-replace').onclick = () => doImport(text, 'replace', overlay);
      document.body.appendChild(overlay);
    }

    function doImport(text, mode, overlay) {
      try {
        DB.importJSON(text, mode);
        overlay.remove();
        Components.showToast('导入成功 ✓');
        Router.navigate('/');
        window.HomePage?.render();
      } catch (e) {
        Components.showToast('导入失败：' + e.message, 'error');
      }
    }
  </script>

</body>

</html>
